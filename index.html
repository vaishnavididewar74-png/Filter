<!Doctype html>
	<html>
		<head>
			<link rel="stylesheet" href="index.css"></link>
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
		</head>
		<body>
		<center><h1>Filters Used</h1></center>
			<section id="All">
			
				<section id="One">
					<img src="Image/8.png" class="img">
					<input type="checkbox" id="start" hidden>
						
					<section class="start-screen">
						<h2><label id="start-button" for="start">Start</label></h2>
					</section>
						
					<input type="radio" id="blur" name="filter" checked hidden>
					<input type="radio" id="bright" name="filter" hidden>
					<input type="radio" id="sepia" name="filter" hidden>
					<input type="radio" id="gray" name="filter" hidden>
					<input type="radio" id="contrast" name="filter" hidden>
					<input type="radio" id="saturate" name="filter" hidden>
					<input type="radio" id="hue-rotate" name="filter" hidden>
					<input type="radio" id="drop-shadow" name="filter" hidden>
					<input type="radio" id="invert" name="filter" hidden>
					<input type="radio" id="opacity" name="filter" hidden>
					
					<section id="editor">
						<section class="slides">
							<img src="Image/8.png" class="slide">
						</section>
						<center>
							<section class="filter">
								<label for="blur">Blur</label>
								<label for="bright">Brightness</label>
								<label for="sepia">Sepia</label>
								<label for="gray">Grayscale</label>
								<label for="contrast">Contrast</label>
								<label for="saturate">Saturate</label>
								<label for="hue-rotate">Hue-rotate</label>
								<label for="drop-shadow">Drop-shadow</label>
								<label for="invert">Invert</label>
								<label for="opacity">Opacity</label>
							</section>
						</center>
						<center><form><button type="submit" class="save-btn">Save</button></form></center>
					</section>
				</section>
				
				<section id="Two">
					<img src="Image/4.png" class="img2">
					<input type="checkbox" id="start2" hidden>
						
					<section class="start-screen">
						<h2><label id="start-button2" for="start2">Start</label></h2>
					</section>
						
					<input type="radio" id="blur2" name="filter" checked hidden>
					<input type="radio" id="bright2" name="filter" hidden>
					<input type="radio" id="sepia2" name="filter" hidden>
					<input type="radio" id="gray2" name="filter" hidden>
					<input type="radio" id="contrast2" name="filter" hidden>
					<input type="radio" id="saturate2" name="filter" hidden>
					<input type="radio" id="hue-rotate2" name="filter" hidden>
					<input type="radio" id="drop-shadow2" name="filter" hidden>
					<input type="radio" id="invert2" name="filter" hidden>
					<input type="radio" id="opacity2" name="filter" hidden>
					
					<section id="editor2">
						<section class="slides">
							<img src="Image/4.png" class="slide">
						</section>
						<center>
							<section class="filter">
								<label for="blur2">Blur</label>
								<label for="bright2">Brightness</label>
								<label for="sepia2">Sepia</label>
								<label for="gray2">Grayscale</label>
								<label for="contrast2">Contrast</label>
								<label for="saturate2">Saturate</label>
								<label for="hue-rotate2">Hue-rotate</label>
								<label for="drop-shadow2">Drop-shadow</label>
								<label for="invert2">Invert</label>
								<label for="opacity2">Opacity</label>
							</section>
						</center>
						<center><form><button type="submit" class="save-btn2">Save</button></form></center>
					</section>
				</section>
				
			</section>
			
			
				
			
			
			
		</body>
	</html>
